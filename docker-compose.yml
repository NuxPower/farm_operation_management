services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: farm-app
    ports:
      - "8000:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: ${APP_KEY:-base64:somekey}
      DB_CONNECTION: pgsql
      DB_HOST: pgsql
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-farm_db}
      DB_USERNAME: ${DB_USERNAME:-sail}
      DB_PASSWORD: ${DB_PASSWORD:-password}
    depends_on:
      - pgsql
    networks:
      - farm-network

  pgsql:
    image: 'postgres:15'
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: '${DB_DATABASE:-farm_db}'
      POSTGRES_USER: '${DB_USERNAME:-sail}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-password}'
    volumes:
      - 'sail-pgsql:/var/lib/postgresql/data'
    networks:
      - farm-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "${DB_DATABASE:-farm_db}", "-U", "${DB_USERNAME:-sail}" ]
      retries: 3
      timeout: 5s

networks:
  farm-network:
    driver: bridge

volumes:
  sail-pgsql:
    driver: local
